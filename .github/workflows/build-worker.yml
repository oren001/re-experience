name: Build Worker Docker Image

on:
  push:
    paths:
      - 'worker/handler.py'
      - 'worker/Dockerfile'
      - 'worker/requirements.txt'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/re-experience-worker:latest
            ghcr.io/${{ github.repository_owner }}/re-experience-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Summary
        run: |
          echo "### Docker image pushed 🐳" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ github.repository_owner }}/re-experience-worker:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**RunPod endpoint:** \`k5d1iyz2uzrbl6\`  (re-experience-3dgs)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "RunPod will pull the new image on the next cold start automatically." >> $GITHUB_STEP_SUMMARY
