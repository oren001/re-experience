<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #080810; overflow: hidden; }

    #status {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      color: rgba(255,255,255,0.5); font-family: system-ui, sans-serif;
      font-size: 13px; letter-spacing: 0.06em; pointer-events: none; z-index: 10;
    }
    #spinner {
      width: 32px; height: 32px; border: 2px solid rgba(255,255,255,0.08);
      border-top-color: rgba(255,255,255,0.5); border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    #bar-wrap { width: 180px; height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; }
    #bar { height: 100%; border-radius: 2px; background: rgba(255,255,255,0.4); width: 0; transition: width 0.4s; }
    #msg { text-align: center; }

    #error {
      display: none; position: fixed; inset: 0; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; z-index: 20; color: #fca5a5;
      font-family: system-ui, sans-serif; font-size: 13px; background: #080810;
    }

    /* ── Click-to-enter overlay ── */
    #enter-overlay {
      display: none; position: fixed; inset: 0; z-index: 15;
      align-items: center; justify-content: center; flex-direction: column; gap: 16px;
      background: rgba(0,0,0,0.35); cursor: pointer;
      font-family: system-ui, sans-serif;
    }
    #enter-overlay.visible { display: flex; }
    #enter-overlay .enter-btn {
      padding: 16px 44px; border: 1px solid rgba(255,255,255,0.28); border-radius: 40px;
      color: rgba(255,255,255,0.9); font-size: 15px; letter-spacing: 0.14em;
      background: rgba(255,255,255,0.08); backdrop-filter: blur(10px);
    }
    #enter-overlay .enter-hint {
      font-size: 11px; color: rgba(255,255,255,0.28); letter-spacing: 0.1em;
    }

    /* ── Movement HUD ── */
    #hud {
      display: none; position: fixed; bottom: 28px; left: 28px; z-index: 15;
      font-family: monospace; font-size: 11px; color: rgba(255,255,255,0.25);
      letter-spacing: 0.06em; line-height: 1.9; pointer-events: none;
    }
    #hud.visible { display: block; }

    /* ── Safe space button ── */
    #safe-space {
      display: none; position: fixed; bottom: 28px; right: 28px; z-index: 15;
      padding: 12px 22px; border: 1px solid rgba(100,180,255,0.25); border-radius: 40px;
      background: rgba(0,20,60,0.55); color: rgba(150,210,255,0.75);
      font-family: system-ui, sans-serif; font-size: 12px; letter-spacing: 0.1em;
      cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s;
    }
    #safe-space.visible { display: block; }
    #safe-space:hover { background: rgba(0,50,120,0.8); border-color: rgba(120,200,255,0.5); }

    /* ── Calm overlay ── */
    #calm {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: radial-gradient(ellipse at 50% 40%, #0d1f3c 0%, #050810 100%);
      flex-direction: column; align-items: center; justify-content: center;
      font-family: system-ui, sans-serif; color: rgba(255,255,255,0.6); gap: 20px;
      animation: fadeIn 0.8s ease;
    }
    #calm.visible { display: flex; }
    #calm h2 { font-size: 1.5rem; font-weight: 200; letter-spacing: 0.22em; }
    #calm p  { font-size: 13px; letter-spacing: 0.1em; opacity: 0.45; }
    #calm button {
      margin-top: 16px; padding: 12px 36px;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 40px;
      background: transparent; color: rgba(255,255,255,0.38);
      font-size: 12px; letter-spacing: 0.12em; cursor: pointer; transition: all 0.3s;
    }
    #calm button:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeIn  { from { opacity: 0 } to { opacity: 1 } }
  </style>
</head>
<body>
  <div id="status">
    <div id="spinner"></div>
    <div>
      <div id="msg">Initialising…</div>
      <div id="bar-wrap" style="margin-top:12px"><div id="bar"></div></div>
    </div>
  </div>
  <div id="error"></div>

  <div id="enter-overlay">
    <div class="enter-btn">Click to walk through</div>
    <div class="enter-hint">W A S D · mouse to look · ESC to pause · Q for safe space</div>
  </div>

  <div id="hud">
    W / S &nbsp;— forward / back<br>
    A / D &nbsp;— left / right<br>
    Q &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;— safe space<br>
    ESC &nbsp;&nbsp;— pause
  </div>

  <button id="safe-space">⬡ Safe space</button>

  <div id="calm">
    <h2>You are safe</h2>
    <p>Take a breath. You can return when you're ready.</p>
    <button id="calm-return">Return to memory</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "/vendor/three.module.min.js?v=3",
      "three/": "/vendor/three/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three'
    import * as GS from '/vendor/gaussian-splats-3d.module.js?v=3'

    const params     = new URLSearchParams(location.search)
    const plyUrl     = params.get('url')    || '/scene.ply'
    const fileName   = params.get('file')   || 'scene.ply'
    // Person video params
    const personUrl  = params.get('person') || null
    const personX    = parseFloat(params.get('px')     ?? '0')
    const personY    = parseFloat(params.get('py')     ?? '0')
    const personZ    = parseFloat(params.get('pz')     ?? '-2')
    const personScale = parseFloat(params.get('pscale') ?? '1')

    const setMsg   = t => { document.getElementById('msg').textContent = t }
    const setBar   = p => { document.getElementById('bar').style.width = p + '%' }
    const showError = msg => {
      document.getElementById('status').style.display = 'none'
      const el = document.getElementById('error')
      el.style.display = 'flex'
      el.innerHTML = `<div style="max-width:340px;text-align:center;padding:24px;background:rgba(127,29,29,0.3);border:1px solid rgba(239,68,68,0.3);border-radius:12px">
        <p style="margin:0 0 8px">Failed to load scene</p>
        <p style="color:rgba(255,255,255,0.3);font-size:11px;margin:0">${msg}</p>
      </div>`
    }

    window.addEventListener('error',             e => showError(e.error?.message || e.message || 'Unknown error'))
    window.addEventListener('unhandledrejection', e => showError(e.reason?.message || String(e.reason)))

    try {
      setMsg('Creating renderer…'); setBar(10)

      const name   = fileName.toLowerCase()
      const format = name.endsWith('.spz')   ? GS.SceneFormat.Spz
                   : name.endsWith('.splat') ? GS.SceneFormat.Splat
                   : GS.SceneFormat.Ply

      setMsg('Downloading scene…'); setBar(15)
      const fetchRes = await fetch(plyUrl)
      if (!fetchRes.ok) throw new Error(`HTTP ${fetchRes.status} fetching scene`)
      const plyArrayBuffer = await fetchRes.arrayBuffer()
      if (plyArrayBuffer.byteLength === 0) throw new Error('Scene file is empty')
      const header4 = new TextDecoder().decode(new Uint8Array(plyArrayBuffer, 0, 4))
      if (!header4.startsWith('ply')) throw new Error(`Not a PLY file (got ${JSON.stringify(header4)})`)

      const localBlobUrl = URL.createObjectURL(
        new Blob([plyArrayBuffer], { type: 'application/octet-stream' })
      )

      // ── Viewer (no built-in controls — we drive the camera) ──────────
      const viewer = new GS.Viewer({
        cameraUp:              [0, -1, 0],
        initialCameraPosition: [0, -1, 5],
        initialCameraLookAt:   [0, 0, 0],
        selfDrivenMode:        true,
        useBuiltInControls:    false,
        gpuAcceleratedSort:    false,
        sharedMemoryForWorkers: false,
        dynamicScene:          false,
        rootElement:           document.body,
      })

      setMsg('Parsing splats…'); setBar(30)
      await viewer.addSplatScene(localBlobUrl, {
        splatAlphaRemovalThreshold: 1,
        showLoadingUI: false,
        format,
        onProgress: p => { if (p > 0) setBar(30 + p * 0.5) }
      })
      URL.revokeObjectURL(localBlobUrl)

      // ── Auto-fit camera to scene centroid ────────────────────────────
      setMsg('Fitting camera…'); setBar(85)
      let cx = 0, cy = 0, cz = 0, span = 5
      try {
        const mesh  = viewer.splatMesh
        const count = Math.min(mesh.getSplatCount?.() ?? 0, 1000)
        if (count > 0) {
          let minX=Infinity, maxX=-Infinity
          let minY=Infinity, maxY=-Infinity
          let minZ=Infinity, maxZ=-Infinity
          const pos = new THREE.Vector3()
          for (let i = 0; i < count; i++) {
            mesh.getSplatCenter(i, pos, false)
            cx += pos.x; cy += pos.y; cz += pos.z
            if (pos.x < minX) minX=pos.x; if (pos.x > maxX) maxX=pos.x
            if (pos.y < minY) minY=pos.y; if (pos.y > maxY) maxY=pos.y
            if (pos.z < minZ) minZ=pos.z; if (pos.z > maxZ) maxZ=pos.z
          }
          cx /= count; cy /= count; cz /= count
          span = Math.max(maxX-minX, maxY-minY, maxZ-minZ, 0.1)
        }
      } catch(e) { console.warn('[splat] auto-fit failed:', e) }

      // Position camera at edge of scene looking inward
      viewer.camera.position.set(cx, cy - span * 0.05, cz + span * 1.5)
      viewer.camera.lookAt(cx, cy, cz)

      // ── First-person navigation ───────────────────────────────────────
      const euler = new THREE.Euler(0, 0, 0, 'YXZ')
      euler.setFromQuaternion(viewer.camera.quaternion, 'YXZ')
      const keys  = {}
      let walking = false

      const enterOverlay = document.getElementById('enter-overlay')
      const hud          = document.getElementById('hud')
      const safeBtn      = document.getElementById('safe-space')
      const calmEl       = document.getElementById('calm')

      const enterWalk = () => document.body.requestPointerLock()
      const exitWalk  = () => document.exitPointerLock?.()

      enterOverlay.addEventListener('click', enterWalk)

      document.addEventListener('pointerlockchange', () => {
        walking = document.pointerLockElement === document.body
        enterOverlay.classList.toggle('visible', !walking)
        hud.classList.toggle('visible', walking)
      })

      document.addEventListener('mousemove', e => {
        if (!walking) return
        euler.y -= e.movementX * 0.0022
        euler.x -= e.movementY * 0.0022
        euler.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, euler.x))
        viewer.camera.quaternion.setFromEuler(euler)
      })

      // Touch look (mobile / Quest browser)
      let lt = null
      document.addEventListener('touchstart', e => { lt = e.touches[0] }, { passive: true })
      document.addEventListener('touchmove', e => {
        if (!lt) return
        const t = e.touches[0]
        euler.y -= (t.clientX - lt.clientX) * 0.003
        euler.x -= (t.clientY - lt.clientY) * 0.003
        euler.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, euler.x))
        viewer.camera.quaternion.setFromEuler(euler)
        lt = t
      }, { passive: true })

      const fwd  = new THREE.Vector3()
      const rgt  = new THREE.Vector3()
      const mv   = new THREE.Vector3()

      ;(function loop() {
        mv.set(0, 0, 0)
        if (keys['KeyW'] || keys['ArrowUp'])    mv.z -= 1
        if (keys['KeyS'] || keys['ArrowDown'])  mv.z += 1
        if (keys['KeyA'] || keys['ArrowLeft'])  mv.x -= 1
        if (keys['KeyD'] || keys['ArrowRight']) mv.x += 1
        if (mv.lengthSq() > 0) {
          const speed = span * 0.005
          mv.normalize().multiplyScalar(speed)
          fwd.set(0,0,-1).applyQuaternion(viewer.camera.quaternion); fwd.y=0; fwd.normalize()
          rgt.set(1,0, 0).applyQuaternion(viewer.camera.quaternion); rgt.y=0; rgt.normalize()
          viewer.camera.position.addScaledVector(fwd, -mv.z)
          viewer.camera.position.addScaledVector(rgt,  mv.x)
        }
        requestAnimationFrame(loop)
      })()

      document.addEventListener('keydown', e => { keys[e.code] = true })
      document.addEventListener('keyup',   e => { keys[e.code] = false })

      // ── Person video billboard ────────────────────────────────────────
      let personMesh = null
      if (personUrl) {
        try {
          const video = document.createElement('video')
          video.src = personUrl
          video.crossOrigin = 'anonymous'
          video.loop = true
          video.playsInline = true
          video.muted = true
          video.play().catch(() => {})
          // Unmute after first user gesture (autoplay policy)
          document.addEventListener('click', () => {
            video.muted = false; video.play().catch(() => {})
          }, { once: true })

          const tex = new THREE.VideoTexture(video)
          tex.minFilter = tex.magFilter = THREE.LinearFilter

          const h   = 1.7 * personScale
          const w   = 0.85 * personScale
          const mat = new THREE.MeshBasicMaterial({
            map: tex, transparent: true, side: THREE.DoubleSide,
            depthWrite: false, alphaTest: 0.05,
          })
          personMesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat)
          // Position is absolute in scene space
          personMesh.position.set(personX, personY, personZ)
          viewer.threeScene.add(personMesh)
          console.log('[splat] person added at', personX, personY, personZ)
        } catch(e) {
          console.warn('[splat] person video failed:', e)
        }
      }

      // Billboard: person always faces camera
      ;(function billboard() {
        if (personMesh) personMesh.quaternion.copy(viewer.camera.quaternion)
        requestAnimationFrame(billboard)
      })()

      // ── Safe space ────────────────────────────────────────────────────
      const triggerSafe = () => {
        exitWalk()
        calmEl.classList.add('visible')
      }
      safeBtn.addEventListener('click', triggerSafe)
      document.addEventListener('keydown', e => { if (e.code === 'KeyQ') triggerSafe() })
      document.getElementById('calm-return').addEventListener('click', () => {
        calmEl.classList.remove('visible')
        setTimeout(enterWalk, 400)
      })

      // ── Go! ───────────────────────────────────────────────────────────
      setBar(100)
      document.getElementById('status').style.display = 'none'
      safeBtn.classList.add('visible')
      enterOverlay.classList.add('visible')
      viewer.start()

    } catch(e) {
      console.error('[splat] fatal:', e)
      showError(e.message ?? String(e))
    }
  </script>
</body>
</html>
